# Google Cloud Build — single container (FastAPI serves React build)
# Manual submit:
#   gcloud builds submit --config cloudbuild.yaml

substitutions:
  _REGION: asia-northeast3
  _AR_REPO: sketch2render
  _SERVICE: sketch2render-app
  _IMAGE: asia-northeast3-docker.pkg.dev/$PROJECT_ID/sketch2render/app

steps:
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_IMAGE}:$BUILD_ID
      - -t
      - ${_IMAGE}:latest
      - .

  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_IMAGE}
    waitFor: [build]

  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_IMAGE}:$BUILD_ID
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=1Gi
      - --cpu=1
      - --set-secrets=GEMINI_API_KEY=GEMINI_API_KEY:latest
    waitFor: [push]

images:
  - ${_IMAGE}:$BUILD_ID

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
